name: Build and Push monad-execution Image

on:
  push:
    branches:
      - main
      - feature/add-sys-calls

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: streamingfast/monad-execution

jobs:
  build-and-push:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
          flavor: |
            latest=false

      - name: Setup Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: |
            --allow-insecure-entitlement security.insecure

      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Free up disk space
        run: |
          # Remove unnecessary packages to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/az
          sudo docker system prune -af
          df -h

      - name: Configure hugepages (required for build)
        run: |
          sudo bash -c "echo 2048 > /sys/devices/system/node/node0/hugepages/hugepages-2048kB/nr_hugepages"
          sudo bash -c "echo 8 > /sys/devices/system/node/node0/hugepages/hugepages-1048576kB/nr_hugepages"

      - name: Get Commit Hash
        run: echo "GIT_COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: runner
          build-args: |
            GIT_COMMIT_HASH=${{ env.GIT_COMMIT_HASH }}
            CC=gcc-15
            CXX=g++-15
            CMAKE_BUILD_TYPE=Release
            TOOLCHAIN=gcc-avx2
          secrets: |
            actions_results_url=${{ env.ACTIONS_RESULTS_URL }}
            actions_runtime_token=${{ env.ACTIONS_RUNTIME_TOKEN }}
            actions_cache_service_v2=${{ env.ACTIONS_CACHE_SERVICE_V2 }}
          builder: ${{ steps.setup-buildx.outputs.name }}
          allow: security.insecure
          ulimit: "memlock=-1:-1"
          provenance: false
          sbom: false
          cache-from: type=gha,scope=execution-${{ github.ref_name }}
          cache-to: type=gha,scope=execution-${{ github.ref_name }},mode=max
